<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Promo</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <main class="site-container">

    <!-- BLOQUE 01 -->
    <section class="section-static">
      <img
        src="img/fondoweb_01.png"
        alt=""
      />
    </section>

    <!-- BLOQUE 02 -->
    <section class="section-static">
      <img
        src="img/fondoweb_02.png"
        alt=""
      />
    </section>

    <!-- BLOQUE PROMO -->
    <section class="promo-section">

      <!-- SLIDER -->
      <div class="promo-slider">

        <img
          class="promo-image active"
          src="img/fondoweb_03_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_04_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_05_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_06_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_07_promo.png"
          alt=""
        />

      </div>

      <!-- CONTROLES -->
      <div class="promo-controls">

        <button
          class="promo-btn prev-btn"
          aria-label="Anterior"
        ></button>

        <button
          class="promo-btn next-btn"
          aria-label="Siguiente"
        ></button>

      </div>

    </section>

    <!-- BLOQUE CONTACTO -->
    <section class="contact-section">

      <img
        src="img/fondoweb_08.png"
        alt=""
      />

      <!-- BOTONES -->
      <div class="contact-buttons">

        <a
          class="contact-btn"
          href="mailto:vectoreszin@gmail.com"
          aria-label="Enviar email"
        >
          <img
            src="img/icono-mail.png"
            alt=""
          />
        </a>

        <a
          class="contact-btn"
          href="https://wa.me/5490342548563"
          target="_blank"
          aria-label="WhatsApp"
        >
          <img
            src="img/icono-wsp.png"
            alt=""
          />
        </a>

      </div>

    </section>

    <!-- PORTFOLIO -->
    <section class="portfolio-entry">

      <a
        class="portfolio-link"
        href="portfolio.html"
      >

        <img
          src="img/fondoweb_09.png"
          alt=""
        />

      </a>

    </section>

    <!-- BLOQUE FINAL -->
    <section class="section-static">
      <img
        src="img/fondoweb_10.png"
        alt=""
      />
    </section>

  </main>

  <script src="js/main.js"></script>

</body>

</html>
